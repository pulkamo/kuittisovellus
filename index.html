<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Kuittisovellus</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --dark: #1a1208;
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --green: #2d5a27;
    --white: #fdfaf6;
    --border: #e0d5c5;
    --muted: #888;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg); color: var(--dark); min-height: 100vh; min-height: -webkit-fill-available; }

  /* HEADER */
  header {
    background: var(--dark); color: var(--bg);
    padding: env(safe-area-inset-top, 0) 0 0;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--gold);
  }
  .header-inner { padding: 14px 20px 0; }
  .header-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); }
  .header-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; margin: 2px 0 12px; letter-spacing: -0.5px; }
  .header-user { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gold-light); margin-bottom: 10px; }
  nav { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0; background: transparent; color: var(--gold); border: none;
    padding: 10px 18px; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; border-radius: 6px 6px 0 0; transition: all 0.15s; white-space: nowrap;
  }
  .nav-btn.active { background: var(--gold); color: var(--dark); font-weight: 600; }

  /* MAIN */
  main { max-width: 640px; margin: 0 auto; padding: 24px 16px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0)); }
  h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }

  /* CARDS */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }

  /* FORM ELEMENTS */
  label.field-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 11px 13px; border-radius: 8px; border: 1.5px solid var(--border);
    font-size: 15px; background: var(--bg); font-family: 'Source Serif 4', serif;
    color: var(--dark); transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }

  /* BUTTONS */
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: 'Source Serif 4', serif; font-weight: 600; transition: all 0.15s; letter-spacing: 0.3px; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--dark); color: var(--gold); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-outline { background: transparent; border: 2px dashed var(--gold); color: var(--dark); }
  .btn-secondary { background: #eee; color: var(--dark); }
  .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  /* IMAGE UPLOAD */
  .upload-zone {
    border: 2px dashed var(--gold); border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer; background: var(--white);
    margin-bottom: 14px; transition: border-color 0.2s; overflow: hidden;
  }
  .upload-zone.has-image { padding: 0; }
  .upload-zone img { width: 100%; max-height: 300px; object-fit: contain; display: block; }
  .upload-icon { font-size: 42px; margin-bottom: 10px; }
  .upload-hint { font-size: 15px; color: var(--muted); }
  .upload-sub { font-size: 12px; color: #aaa; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

  /* RECEIPT LIST */
  .receipt-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px;
  }
  .receipt-thumb {
    width: 52px; height: 52px; object-fit: cover; border-radius: 6px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .receipt-thumb-placeholder {
    width: 52px; height: 52px; background: var(--bg); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .receipt-info { flex: 1; min-width: 0; }
  .receipt-store { font-weight: 600; font-size: 15px; }
  .receipt-desc { font-size: 13px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .receipt-meta { display: flex; gap: 10px; margin-top: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #999; }
  .receipt-amount { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 16px; color: var(--green); white-space: nowrap; }
  .receipt-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 20px; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filters select { flex: 1; min-width: 140px; }

  /* REPORT */
  .report-hero {
    background: var(--dark); color: var(--gold); border-radius: 14px;
    padding: 28px 24px; text-align: center; margin-bottom: 20px;
  }
  .report-hero-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
  .report-hero-amount { font-family: 'Playfair Display', serif; font-size: 46px; font-weight: 900; letter-spacing: -1px; }
  .report-hero-sub { font-size: 12px; margin-top: 6px; color: #a89060; font-family: 'IBM Plex Mono', monospace; }
  .apt-bar-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
  .apt-bar-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .apt-bar-name { font-weight: 600; font-size: 14px; }
  .apt-bar-amt { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--green); }
  .apt-bar-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
  .apt-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.6s; }
  .apt-bar-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #aaa; margin-top: 4px; }

  /* NOTIFICATION */
  .notif {
    position: fixed; top: 20px; right: 16px; left: 16px; z-index: 9999;
    background: var(--green); color: #fff; padding: 13px 18px; border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25); animation: slideIn 0.3s ease;
    text-align: center;
  }
  .notif.error { background: var(--danger); }
  .notif.info { background: #555; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

  /* LOGIN */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; margin-bottom: 8px; }
  .login-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-bottom: 40px; }
  .login-desc { font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.6; }

  /* SPINNER */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SETTINGS */
  .apt-row { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .apt-row-name { font-weight: 600; font-size: 14px; }
  .apt-row-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 20px; }

  .status-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; margin-left: 8px; }
  .status-ok { background: #d4edda; color: #155724; }
  .status-err { background: #f8d7da; color: #721c24; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .scanning-overlay { text-align: center; padding: 30px; }
  .scanning-overlay .big-icon { font-size: 48px; margin-bottom: 12px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .alert { padding: 13px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; }
  .alert-warn { background: #fff3cd; border: 1px solid #f5c842; }
  .alert-info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  .items-list { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .item-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dotted #eee; }
  .item-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<div id="app"></div>

<!-- MSAL library -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<script>
// ============================================================
// CONFIG — muuta nämä jos vaihdat ympäristöä
// ============================================================
const CONFIG = {
  clientId: '3d405c60-7f65-40d9-8969-8a1d3cc42530',
  tenantId: '3603797d-604f-483a-ab79-f420003bcb16',
  sharePointSite: 'https://pulkamo.sharepoint.com/sites/Kiinteistpulkamo',
  listName: 'Kuitit',
  anthropicKey: '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', // Täytä tähän Anthropic API-avain
};

// ============================================================
// MSAL SETUP
// ============================================================
const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true },
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const SCOPES = ['Sites.ReadWrite.All', 'User.Read'];

// ============================================================
// STATE
// ============================================================
let state = {
  view: 'scan',
  account: null,
  accessToken: null,
  siteId: null,
  listId: null,
  receipts: [],
  apartments: JSON.parse(localStorage.getItem('apartments') || '["Mannerheimintie 12 A 3","Runeberginkatu 5 B 14","Töölönkatu 22 C 8"]'),
  selectedApartment: '',
  imageFile: null,
  imagePreview: null,
  scanning: false,
  scanResult: null,
  scanError: null,
  editForm: null,
  filterApartment: 'all',
  filterYear: 'all',
  loading: false,
  spError: null,
  notification: null,
  newApartment: '',
  showAddApartment: false,
};
state.selectedApartment = state.apartments[0] || '';

// ============================================================
// HELPERS
// ============================================================
function fmt(amount) {
  if (amount === null || amount === undefined || amount === '') return '—';
  return Number(amount).toFixed(2).replace('.', ',') + ' €';
}

function notify(msg, type = 'success') {
  state.notification = { msg, type };
  render();
  setTimeout(() => { state.notification = null; render(); }, 3500);
}

function saveApartments() {
  localStorage.setItem('apartments', JSON.stringify(state.apartments));
}

// ============================================================
// AUTH
// ============================================================
async function login() {
  try {
    await msalInstance.handleRedirectPromise();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      state.account = accounts[0];
      await getToken();
      await initSharePoint();
      await loadReceipts();
    } else {
      await msalInstance.loginRedirect({ scopes: SCOPES });
    }
  } catch (e) {
    console.error(e);
    notify('Kirjautuminen epäonnistui: ' + e.message, 'error');
  }
}

async function getToken() {
  try {
    const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: state.account });
    state.accessToken = result.accessToken;
  } catch {
    const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    state.accessToken = result.accessToken;
  }
}

function logout() {
  msalInstance.logoutRedirect();
}

// ============================================================
// SHAREPOINT
// ============================================================
async function graphGet(url) {
  await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    headers: { Authorization: 'Bearer ' + state.accessToken }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function graphPost(url, body) {
  await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + state.accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function graphDelete(url) {
  await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + state.accessToken }
  });
  if (!r.ok && r.status !== 204) throw new Error(await r.text());
}

async function initSharePoint() {
  try {
    // Get site ID
    const hostname = 'pulkamo.sharepoint.com';
    const sitePath = '/sites/Kiinteistpulkamo';
    const site = await graphGet(`/sites/${hostname}:${sitePath}`);
    state.siteId = site.id;

    // Get or create list
    const lists = await graphGet(`/sites/${state.siteId}/lists?$filter=displayName eq '${CONFIG.listName}'`);
    if (lists.value.length > 0) {
      state.listId = lists.value[0].id;
      // Ensure columns exist
      await ensureColumns();
    } else {
      await createList();
    }
    state.spError = null;
  } catch (e) {
    state.spError = e.message;
    console.error('SharePoint init error:', e);
  }
}

async function ensureColumns() {
  const cols = await graphGet(`/sites/${state.siteId}/lists/${state.listId}/columns`);
  const existing = cols.value.map(c => c.name);
  const needed = [
    { name: 'Paivamaara', text: {} },
    { name: 'Summa', number: { decimalPlaces: 'two' } },
    { name: 'Kauppa', text: {} },
    { name: 'Kuvaus', text: {} },
    { name: 'Huoneisto', text: {} },
    { name: 'KuvaBase64', text: { allowMultipleLines: true } },
  ];
  for (const col of needed) {
    if (!existing.includes(col.name)) {
      try { await graphPost(`/sites/${state.siteId}/lists/${state.listId}/columns`, col); } catch {}
    }
  }
}

async function createList() {
  const list = await graphPost(`/sites/${state.siteId}/lists`, {
    displayName: CONFIG.listName,
    columns: [
      { name: 'Paivamaara', text: {} },
      { name: 'Summa', number: { decimalPlaces: 'two' } },
      { name: 'Kauppa', text: {} },
      { name: 'Kuvaus', text: {} },
      { name: 'Huoneisto', text: {} },
      { name: 'KuvaBase64', text: { allowMultipleLines: true } },
    ],
    list: { template: 'genericList' }
  });
  state.listId = list.id;
}

async function loadReceipts() {
  if (!state.siteId || !state.listId) return;
  state.loading = true; render();
  try {
    const data = await graphGet(`/sites/${state.siteId}/lists/${state.listId}/items?expand=fields&$top=500`);
    state.receipts = data.value.map(item => ({
      id: item.id,
      date: item.fields.Paivamaara || '',
      total: item.fields.Summa || 0,
      store: item.fields.Kauppa || '',
      description: item.fields.Kuvaus || '',
      apartment: item.fields.Huoneisto || '',
      imagePreview: item.fields.KuvaBase64 ? 'data:image/jpeg;base64,' + item.fields.KuvaBase64 : null,
    }));
  } catch (e) {
    notify('Kuittien lataus epäonnistui: ' + e.message, 'error');
  }
  state.loading = false; render();
}

async function saveReceiptToSP(form, imageBase64) {
  const fields = {
    Title: form.store || 'Kuitti',
    Paivamaara: form.date,
    Summa: parseFloat(form.total) || 0,
    Kauppa: form.store,
    Kuvaus: form.description,
    Huoneisto: form.apartment,
    KuvaBase64: imageBase64 ? imageBase64.substring(0, 250000) : '', // SP text field limit
  };
  const item = await graphPost(`/sites/${state.siteId}/lists/${state.listId}/items`, { fields });
  return item;
}

async function deleteReceiptFromSP(id) {
  await graphDelete(`/sites/${state.siteId}/lists/${state.listId}/items/${id}`);
}

// ============================================================
// CLAUDE API
// ============================================================
async function scanWithClaude(imageFile) {
  if (!CONFIG.anthropicKey) {
    return { error: 'Anthropic API-avain puuttuu. Lisää se tiedoston CONFIG.anthropicKey-kenttään.' };
  }
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(imageFile);
  });
  const mediaType = imageFile.type || 'image/jpeg';

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: `Analysoi tämä kuitti ja palauta VAIN JSON-objekti ilman mitään muuta tekstiä tai markdown-koodia.

JSON-rakenne:
{"date":"PP.KK.VVVV tai null","total":numero tai null,"store":"kaupan nimi tai null","items":[{"name":"tuotteen nimi","price":numero}],"description":"lyhyt kuvaus suomeksi"}

Hinnat aina numeroina ilman €-merkkiä. Jos et tunnista kenttää, käytä null.` }
        ]
      }]
    })
  });
  const data = await response.json();
  const text = (data.content || []).map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ============================================================
// ACTIONS
// ============================================================
function handleImageChange(file) {
  if (!file) return;
  state.imageFile = file;
  state.scanResult = null;
  state.scanError = null;
  state.editForm = null;
  const reader = new FileReader();
  reader.onload = e => { state.imagePreview = e.target.result; render(); };
  reader.readAsDataURL(file);
}

async function doScan() {
  if (!state.imageFile) return;
  state.scanning = true; state.scanError = null; render();
  try {
    const result = await scanWithClaude(state.imageFile);
    if (result.error) { state.scanError = result.error; }
    else {
      state.scanResult = result;
      state.editForm = {
        date: result.date || '',
        total: result.total ?? '',
        store: result.store || '',
        description: result.description || '',
        apartment: state.selectedApartment,
        items: result.items || [],
      };
    }
  } catch (e) {
    state.scanError = 'Virhe: ' + e.message;
    state.editForm = { date: '', total: '', store: '', description: '', apartment: state.selectedApartment, items: [] };
  }
  state.scanning = false; render();
}

async function doSave() {
  if (!state.editForm) return;
  state.loading = true; render();
  try {
    const imageBase64 = state.imageFile ? await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(state.imageFile);
    }) : null;

    const item = await saveReceiptToSP(state.editForm, imageBase64);
    state.receipts.unshift({
      id: item.id,
      date: state.editForm.date,
      total: parseFloat(state.editForm.total) || 0,
      store: state.editForm.store,
      description: state.editForm.description,
      apartment: state.editForm.apartment,
      imagePreview: imageBase64 ? 'data:image/jpeg;base64,' + imageBase64 : null,
    });
    state.imageFile = null; state.imagePreview = null;
    state.scanResult = null; state.editForm = null; state.scanError = null;
    notify('Kuitti tallennettu SharePointiin! ✓');
    state.view = 'list';
  } catch (e) {
    notify('Tallennus epäonnistui: ' + e.message, 'error');
  }
  state.loading = false; render();
}

async function doDelete(id) {
  if (!confirm('Poistetaanko kuitti SharePointista?')) return;
  state.loading = true; render();
  try {
    await deleteReceiptFromSP(id);
    state.receipts = state.receipts.filter(r => r.id !== id);
    notify('Kuitti poistettu.', 'info');
  } catch (e) {
    notify('Poisto epäonnistui: ' + e.message, 'error');
  }
  state.loading = false; render();
}

function getFiltered() {
  return state.receipts.filter(r => {
    const aptMatch = state.filterApartment === 'all' || r.apartment === state.filterApartment;
    const year = r.date ? r.date.split('.')[2] : null;
    const yearMatch = state.filterYear === 'all' || year === state.filterYear;
    return aptMatch && yearMatch;
  });
}

function getYears() {
  return [...new Set(state.receipts.map(r => r.date?.split('.')[2]).filter(Boolean))].sort().reverse();
}

function exportCSV() {
  const filtered = getFiltered();
  const rows = [['Päivämäärä','Kauppa','Kuvaus','Summa (€)','Huoneisto']];
  filtered.forEach(r => rows.push([r.date, r.store, r.description, String(r.total).replace('.',','), r.apartment]));
  const csv = rows.map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `kuitit_${state.filterYear === 'all' ? 'kaikki' : state.filterYear}.csv`; a.click();
  URL.revokeObjectURL(url);
  notify('CSV ladattu!');
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (!state.account) {
    app.innerHTML = renderLogin();
    return;
  }
  app.innerHTML = `
    ${state.notification ? `<div class="notif ${state.notification.type}">${state.notification.msg}</div>` : ''}
    <header>
      <div class="header-inner">
        <div class="header-label">Vuokraisäntä</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="header-title">Kuittihallinta</div>
          <button onclick="logout()" style="background:none;border:none;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;">Kirjaudu ulos</button>
        </div>
        <div class="header-user">👤 ${state.account.name || state.account.username} ${state.spError ? '<span class="status-badge status-err">SP-virhe</span>' : '<span class="status-badge status-ok">SharePoint ✓</span>'}</div>
        <nav>
          ${['scan','list','report','settings'].map((v,i) => {
            const labels = ['📷 Skannaa','📋 Kuitit','📊 Raportti','⚙️ Huoneistot'];
            return `<button class="nav-btn ${state.view===v?'active':''}" onclick="setView('${v}')">${labels[i]}</button>`;
          }).join('')}
        </nav>
      </div>
    </header>
    <main>${renderView()}</main>
  `;
  // Re-attach file input listener
  const fi = document.getElementById('fileInput');
  if (fi) fi.addEventListener('change', e => { handleImageChange(e.target.files[0]); });
}

function renderLogin() {
  return `
    <div class="login-screen">
      <div class="login-logo">🏠 Kuitit</div>
      <div class="login-sub">Vuokraisännän kuittihallinta</div>
      <div class="login-desc">Skannaa kuitteja tekoälyllä ja tallenna ne automaattisesti SharePointiin huoneistoittain.</div>
      <button class="btn btn-primary" style="max-width:320px;padding:16px;" onclick="login()">
        🔑 Kirjaudu Microsoft 365 -tunnuksilla
      </button>
      <div style="margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);max-width:300px;text-align:center;">
        Kirjautuminen ohjaa Microsoftin kirjautumissivulle
      </div>
    </div>
  `;
}

function renderView() {
  if (state.view === 'scan') return renderScan();
  if (state.view === 'list') return renderList();
  if (state.view === 'report') return renderReport();
  if (state.view === 'settings') return renderSettings();
  return '';
}

function renderScan() {
  const f = state.editForm;
  return `
    <h2>Skannaa kuitti</h2>

    ${!CONFIG.anthropicKey ? `<div class="alert alert-warn">⚠️ Anthropic API-avain puuttuu! Lisää se tiedoston <code>CONFIG.anthropicKey</code>-kenttään, jotta tekoälyluku toimii. Voit silti syöttää tiedot käsin.</div>` : ''}

    <div class="card" style="margin-bottom:14px;">
      <label class="field-label">Huoneisto</label>
      <select onchange="state.selectedApartment=this.value;if(state.editForm)state.editForm.apartment=this.value;render()">
        ${state.apartments.map(a => `<option ${a===state.selectedApartment?'selected':''}>${a}</option>`).join('')}
      </select>
    </div>

    <div class="upload-zone ${state.imagePreview?'has-image':''}" onclick="document.getElementById('fileInput').click()">
      ${state.imagePreview
        ? `<img src="${state.imagePreview}" alt="kuitti">`
        : `<div class="upload-icon">🧾</div><div class="upload-hint">Klikkaa lisätäksesi kuva kuitista</div><div class="upload-sub">JPG · PNG · HEIC</div>`}
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

    ${state.scanning ? `
      <div class="card scanning-overlay">
        <div class="big-icon">🔍</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);">Tekoäly lukee kuittia...</div>
      </div>
    ` : ''}

    ${state.imageFile && !state.scanResult && !f && !state.scanning ? `
      <button class="btn btn-primary" onclick="doScan()" style="margin-bottom:10px;">🔍 Lue kuitti tekoälyllä</button>
    ` : ''}

    ${state.scanError ? `<div class="alert alert-warn">⚠️ ${state.scanError}</div>` : ''}

    ${f ? `
      <div class="card">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;margin-bottom:16px;color:var(--muted);">
          ${state.scanResult ? '✅ TUNNISTETUT TIEDOT — tarkista ennen tallennusta' : '✏️ SYÖTÄ TIEDOT KÄSIN'}
        </div>
        <div class="form-grid">
          <div>
            <label class="field-label">Päivämäärä</label>
            <input value="${f.date}" oninput="state.editForm.date=this.value" placeholder="PP.KK.VVVV">
          </div>
          <div>
            <label class="field-label">Summa (€)</label>
            <input type="number" step="0.01" value="${f.total}" oninput="state.editForm.total=this.value" placeholder="0,00">
          </div>
          <div>
            <label class="field-label">Kauppa</label>
            <input value="${f.store}" oninput="state.editForm.store=this.value" placeholder="Esim. K-rauta">
          </div>
          <div>
            <label class="field-label">Huoneisto</label>
            <select onchange="state.editForm.apartment=this.value">
              ${state.apartments.map(a => `<option ${a===f.apartment?'selected':''}>${a}</option>`).join('')}
            </select>
          </div>
          <div class="form-full">
            <label class="field-label">Kuvaus</label>
            <input value="${f.description}" oninput="state.editForm.description=this.value" placeholder="Esim. Suihkunletku, sarana...">
          </div>
        </div>
        ${f.items?.length > 0 ? `
          <div class="items-list">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Tunnistetut tuotteet</div>
            ${f.items.map(it => `<div class="item-row"><span>${it.name}</span><span style="font-family:'IBM Plex Mono',monospace;">${fmt(it.price)}</span></div>`).join('')}
          </div>
        ` : ''}
        <div class="btn-row">
          <button class="btn btn-success" onclick="doSave()" ${state.loading?'disabled':''}>
            ${state.loading?'<span class="spinner"></span>':'💾'} Tallenna SharePointiin
          </button>
          <button class="btn btn-secondary btn-sm" onclick="state.editForm=null;state.scanResult=null;render()">Peruuta</button>
        </div>
      </div>
    ` : ''}

    ${!f && !state.scanning ? `
      <button class="btn btn-outline" onclick="state.editForm={date:'',total:'',store:'',description:'',apartment:state.selectedApartment,items:[]};render()">
        ✏️ Syötä tiedot käsin
      </button>
    ` : ''}
  `;
}

function renderList() {
  const filtered = getFiltered();
  const total = filtered.reduce((s,r) => s + (Number(r.total)||0), 0);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="margin:0;">Kuitit</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="loadReceipts()">↻</button>
        <button class="btn btn-primary btn-sm" onclick="setView('scan')">+ Uusi</button>
      </div>
    </div>
    <div class="filters">
      <select onchange="state.filterApartment=this.value;render()">
        <option value="all" ${state.filterApartment==='all'?'selected':''}>Kaikki huoneistot</option>
        ${state.apartments.map(a => `<option ${a===state.filterApartment?'selected':''}>${a}</option>`).join('')}
      </select>
      <select onchange="state.filterYear=this.value;render()" style="width:110px;flex:none;">
        <option value="all" ${state.filterYear==='all'?'selected':''}>Kaikki vuodet</option>
        ${getYears().map(y => `<option ${y===state.filterYear?'selected':''}>${y}</option>`).join('')}
      </select>
      <button class="btn btn-success btn-sm" onclick="exportCSV()">⬇️ CSV</button>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:14px;">
      ${filtered.length} kuittia — yhteensä ${fmt(total)}
    </div>
    ${state.loading ? '<div class="empty-state"><div class="big-icon" style="animation:pulse 1s infinite">⏳</div>Ladataan...</div>' : ''}
    ${!state.loading && filtered.length === 0 ? '<div class="empty-state"><div class="empty-icon">🧾</div>Ei kuitteja tällä suodatuksella.</div>' : ''}
    ${filtered.map(r => `
      <div class="receipt-item">
        ${r.imagePreview
          ? `<img class="receipt-thumb" src="${r.imagePreview}" alt="kuitti">`
          : `<div class="receipt-thumb-placeholder">🧾</div>`}
        <div class="receipt-info">
          <div class="receipt-store">${r.store || 'Tuntematon'}</div>
          <div class="receipt-desc">${r.description || '—'}</div>
          <div class="receipt-meta">
            <span>📅 ${r.date || '—'}</span>
            <span>🏠 ${r.apartment || '—'}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div class="receipt-amount">${fmt(r.total)}</div>
          <button class="receipt-delete" onclick="doDelete('${r.id}')">×</button>
        </div>
      </div>
    `).join('')}
  `;
}

function renderReport() {
  const allFiltered = state.receipts.filter(r => state.filterYear === 'all' || r.date?.split('.')[2] === state.filterYear);
  const grandTotal = allFiltered.reduce((s,r) => s + (Number(r.total)||0), 0);
  const perApt = state.apartments.map(apt => ({
    apt,
    total: allFiltered.filter(r => r.apartment === apt).reduce((s,r) => s + (Number(r.total)||0), 0),
    count: allFiltered.filter(r => r.apartment === apt).length,
  })).filter(a => a.count > 0);
  const maxTotal = Math.max(...perApt.map(a => a.total), 1);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="margin:0;">Raportti</h2>
      <select onchange="state.filterYear=this.value;render()" style="width:120px;">
        <option value="all" ${state.filterYear==='all'?'selected':''}>Kaikki vuodet</option>
        ${getYears().map(y => `<option ${y===state.filterYear?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>
    <div class="report-hero">
      <div class="report-hero-label">Kokonaiskulut ${state.filterYear !== 'all' ? state.filterYear : ''}</div>
      <div class="report-hero-amount">${fmt(grandTotal)}</div>
      <div class="report-hero-sub">${allFiltered.length} kuittia</div>
    </div>
    ${perApt.length === 0 ? '<div class="empty-state"><div class="empty-icon">📊</div>Ei kuitteja vielä.</div>' : ''}
    ${perApt.map(a => `
      <div class="apt-bar-card">
        <div class="apt-bar-top">
          <div class="apt-bar-name">🏠 ${a.apt}</div>
          <div class="apt-bar-amt">${fmt(a.total)}</div>
        </div>
        <div class="apt-bar-track"><div class="apt-bar-fill" style="width:${(a.total/maxTotal*100).toFixed(1)}%"></div></div>
        <div class="apt-bar-sub">${a.count} kuittia</div>
      </div>
    `).join('')}
    <button class="btn btn-success" style="margin-top:10px;" onclick="exportCSV()">⬇️ Lataa CSV verotusta varten</button>
  `;
}

function renderSettings() {
  return `
    <h2>Huoneistot</h2>
    ${state.apartments.map((a, i) => `
      <div class="apt-row">
        <div class="apt-row-name">🏠 ${a}</div>
        <button class="apt-row-del" onclick="removeApartment(${i})">×</button>
      </div>
    `).join('')}
    ${state.showAddApartment ? `
      <div class="card" style="border:2px solid var(--gold);">
        <label class="field-label">Uusi huoneisto</label>
        <input id="newAptInput" value="${state.newApartment}" oninput="state.newApartment=this.value" placeholder="Esim. Aleksanterinkatu 10 A 5" style="margin-bottom:12px;">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addApartment()">Lisää</button>
          <button class="btn btn-secondary btn-sm" onclick="state.showAddApartment=false;render()">Peruuta</button>
        </div>
      </div>
    ` : `
      <button class="btn btn-outline" style="margin-top:4px;" onclick="state.showAddApartment=true;render()">+ Lisää huoneisto</button>
    `}
    <div class="card" style="margin-top:24px;background:var(--bg);">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Anthropic API-avain</div>
      <input type="password" placeholder="sk-ant-..." value="${CONFIG.anthropicKey}" oninput="CONFIG.anthropicKey=this.value;localStorage.setItem('anthropicKey',this.value);" style="margin-bottom:8px;">
      <div style="font-size:12px;color:var(--muted);">Avain tallennetaan tähän laitteeseen. Hanki avain osoitteesta <a href="https://console.anthropic.com" target="_blank" style="color:var(--gold);">console.anthropic.com</a></div>
    </div>
    <div class="alert alert-info" style="margin-top:16px;">
      SharePoint: ${CONFIG.sharePointSite}<br>
      Lista: ${CONFIG.listName}<br>
      ${state.spError ? '❌ ' + state.spError : '✅ Yhdistetty'}
    </div>
  `;
}

function setView(v) { state.view = v; render(); }
function removeApartment(i) {
  if (!confirm('Poistetaanko huoneisto listalta? Kuitit säilyvät SharePointissa.')) return;
  state.apartments.splice(i, 1); saveApartments(); render();
}
function addApartment() {
  if (!state.newApartment.trim()) return;
  state.apartments.push(state.newApartment.trim());
  state.newApartment = ''; state.showAddApartment = false;
  saveApartments(); notify('Huoneisto lisätty!'); render();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  // Load saved API key
  const savedKey = localStorage.getItem('anthropicKey');
  if (savedKey) CONFIG.anthropicKey = savedKey;

  render(); // show login screen first

  try {
    await msalInstance.initialize();
    const result = await msalInstance.handleRedirectPromise();
    if (result) state.account = result.account;

    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      state.account = accounts[0];
      await getToken();
      await initSharePoint();
      await loadReceipts();
    }
  } catch (e) {
    console.error(e);
  }
  render();
}

init();
</script>

</html>
